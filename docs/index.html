<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>se0r12.github.io</title>
        <style>
        table {
            width: 10%;
            border-collapse: collapse; /* テーブルの枠を重ねて表示 */
            font-family: monospace; /* 等幅フォントを指定 */
        }
        th, td {
            padding: 3px; /* セル内のパディング */
            text-align: left; /* テキストを左揃え */
        }
        </style>
        <script src="/js/ascii.js" defer></script>
    </head>

    <body>
        <pre id="ascii-art">
        </pre>
        <pre id="time"></pre>
        <pre id="data" style="background-color: gray; white-space: pre-wrap;"></pre>
        <table>
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Title</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>None</td>
                    <td><a href="/about.md" onclick="show(this);return false">about</a></td>
                </tr>
                <tr>
                    <td>CTF</td>
                    <td><a href="./ctf/Hack.luCTF2024/README.md" onclick="show(this);return false">Hack.lu CTF 2024</a></td>
                </tr>
            </tbody>
        </table>
        <script>
            const dataElm = document.getElementById("data");
            const show = async (elm) => {
                const url = elm.href;
                const path = (new URL(url)).pathname;
                location.hash=path;
                fetch(path).then(response => response.text()).then(data => dataElm.textContent=data);
            }
            const setTime = () => {
                let now = new Date();
                document.getElementById("time").textContent = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            }
            setTime();
            setInterval(setTime, 1000);
        </script>
    </body>
</html>
