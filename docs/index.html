<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>se0r12.github.io</title>
        <style>
        table {
            border-collapse: collapse; /* テーブルの枠を重ねて表示 */
            font-family: monospace; /* 等幅フォントを指定 */
        }
        th, td {
            padding: 3px; /* セル内のパディング */
            text-align: left; /* テキストを左揃え */
        }
        </style>
        <script src="/js/ascii.js" defer></script>
        <script src="/js/table.js"></script>
        <script src=" https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js "></script>
    </head>

    <body>
        <pre id="ascii-art" style="font-size: small;">
        </pre>
        <pre id="time"></pre>
        <pre id="data"></pre>
        <div style="font-family: monospace;">
            (<a href="#" style="font-family: monospace;" onclick="setMode('html');return false">html</a>|<a href="#" style="font-family: monospace;" onclick="setMode('md');return false">md</a>)
        </div>
        <script>
            const md = window.markdownit();
            let mode = "md";
            const dataElm = document.getElementById("data");

            const drawData = (path) =>{
                fetch(path).then(response => response.text()).then(data => {
                    if (mode === "md") {
                        dataElm.textContent=data
                        dataElm.setAttribute("style", "background-color:cornsilk; white-space: pre-wrap; padding: 2px; border: 1px solid #888");
                    } else {
                        dataElm.innerHTML = md.render(data);
                        dataElm.setAttribute("style", "background-color:cornsilk; white-space: pre-wrap; padding: 2px; border: 1px solid #888");
                    }
                }).catch(err => alert(err));
            }

            const show = async (elm) => {
                const url = elm.href;
                const path = (new URL(url)).pathname;
                location.hash=path;
                drawData(path);
            }

            const setMode = (after) => {
                const before = mode;
                mode = after;
                if (dataElm.innerText !== "" && before !== after) {
                    const path = location.hash.slice(1);
                    drawData(path);
                }
            }
            class BlogData {
                constructor(category, title, path) {
                    this.category = category;
                    this.title = title;
                    this.path = path;
                }
            };
            const categories = {
                CTF: "ctf",
                None: "none",
            }
            const blogs = [
                new BlogData(categories.None, "about", "./blog/none/about/README.md"),
                new BlogData(categories.CTF, "Hack.lu CTF 2024 Writeup", "./blog/ctf/Hack.luCTF2024/README.md"),
                new BlogData(categories.None, "ブログを作った話。", "./blog/none/ブログを作った話/README.md"),
            ];
            draw(blogs);

            const setTime = () => {
                let now = new Date();
                document.getElementById("time").textContent = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            }
            setTime();
            setInterval(setTime, 1000);
        </script>
    </body>
</html>
